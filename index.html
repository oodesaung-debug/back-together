
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 h-screen flex flex-col items-center justify-center overflow-hidden">
    <div class="text-center p-5">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/X83YpL8rXq6L8Y5M6v/giphy.gif" class="mx-auto w-48 mb-4 rounded-lg">
        
        <h1 id="question" class="text-3xl font-bold text-red-500 mb-8">ပြန်တွဲရအောင်နော်... </h1>
        
        <div class="flex flex-wrap gap-4 justify-center items-center" id="buttons">
            <button id="yes-btn" onclick="accepted()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-8 rounded-full transition-all">အင်း</button>
            <button id="no-btn" onclick="makeYesBigger()" class="bg-gray-400 text-white font-bold py-2 px-8 rounded-full transition-all">ဟင့်အင်း</button>
        </div>
    </div>

    <script>
        let yesSize = 1;
        function makeYesBigger() {
            yesSize += 0.5;
            document.getElementById('yes-btn').style.transform = scale(${yesSize});
            document.getElementById('no-btn').innerHTML = "တကယ်လား?";
        }

        function accepted() {
            document.getElementById('question').innerHTML = "ကျေးဇူးပါနော် အချစ်လေး ";
            document.getElementById('main-gif').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/I7mK7o0v7hZl5G7sWv/giphy.gif";
            document.getElementById('buttons').classList.add('hidden');
        }
    </script>
</body>
</html>
