<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(180deg, #fff5f5 0%, #fed7d7 100%); }
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
    </style>
</head>
<body class="gradient-bg h-screen flex flex-col items-center justify-center overflow-hidden">
    <div class="text-center p-5">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/X83YpL8rXq6L8Y5M6v/giphy.gif" class="mx-auto w-48 mb-4 bounce rounded-lg">
        
        <h1 id="question" class="text-3xl font-bold text-red-500 mb-8">ပြန်တွဲရအောင်နော်... </h1>
        
        <div class="flex gap-4 justify-center" id="buttons">
            <button onclick="accepted()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-8 rounded-full transition-all transform hover:scale-110">အင်း</button>
            <button id="no-btn" onmouseover="moveButton()" class="bg-gray-400 text-white font-bold py-2 px-8 rounded-full transition-all">ဟင့်အင်း</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function accepted() {
            document.getElementById('question').innerHTML = "ကိုယ့်ဆီကိုပြန်လာပေးလို့ကျေးဇူးပါနော်အချစ်လေး ";
            // ဒုတိယစတေကာ (ချော့နေတဲ့ပုံ) - "အင်း" နှိပ်ပြီးရင်ပြမယ်
            document.getElementById('main-gif').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZzR4eXN0eDR3ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/I7mK7o0v7hZl5G7sWv/giphy.gif";
            document.getElementById('buttons').classList.add('hidden');
        }
    </script>
</body>
</html>
